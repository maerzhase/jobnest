name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      jobnest_tag:
        description: Existing jobnest release tag to rebuild, for example jobnest-v0.0.1
        required: true
      jobnest_version:
        description: Release version label to display, for example 0.0.1
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      should_release_jobnest: ${{ steps.jobnest-version.outputs.changed }}
      jobnest_version: ${{ steps.jobnest-version.outputs.current_version }}
      jobnest_tag: ${{ steps.jobnest-version.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/jobnest/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect jobnest version change
        id: jobnest-version
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./apps/jobnest/package.json').version")
          PREVIOUS_VERSION=$(git show "${{ github.event.before }}:apps/jobnest/package.json" 2>/dev/null | node -e "let input='';process.stdin.on('data', chunk => input += chunk);process.stdin.on('end', () => { if (!input.trim()) process.exit(1); console.log(JSON.parse(input).version); });" || true)

          if [ -n "$PREVIOUS_VERSION" ] && [ "$PREVIOUS_VERSION" = "$CURRENT_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=jobnest-v$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm build

      - name: Create release pull request or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-jobnest:
    needs:
      - release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
      max-parallel: 1
    runs-on: ${{ matrix.platform }}
    if: |
      always() &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.release.outputs.should_release_jobnest == 'true'
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject updater config
        env:
          JOBNEST_UPDATER_PUBLIC_KEY: ${{ secrets.JOBNEST_UPDATER_PUBLIC_KEY }}
        run: |
          if [ -z "$JOBNEST_UPDATER_PUBLIC_KEY" ]; then
            echo "JOBNEST_UPDATER_PUBLIC_KEY is not set; continuing without updater config."
            exit 0
          fi

          node <<'NODE'
          const fs = require('node:fs');
          const path = 'apps/jobnest/src-tauri/tauri.conf.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));

          config.bundle ??= {};
          config.bundle.createUpdaterArtifacts = true;
          config.plugins ??= {};
          config.plugins.updater = {
            pubkey: process.env.JOBNEST_UPDATER_PUBLIC_KEY,
            endpoints: [
              'https://github.com/maerzhase/jobnest/releases/latest/download/latest.json',
            ],
          };

          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          NODE

      - name: Build and upload jobnest release bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/jobnest
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.jobnest_tag || needs.release.outputs.jobnest_tag }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && format('jobnest v{0}', inputs.jobnest_version) || 'jobnest v__VERSION__' }}
          releaseBody: ${{ github.event_name == 'workflow_dispatch' && format('Desktop bundles for jobnest v{0}.', inputs.jobnest_version) || 'Desktop bundles for jobnest v__VERSION__.' }}
          releaseDraft: false
          prerelease: false
          replaceExistingArtifacts: true
